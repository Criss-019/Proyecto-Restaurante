server:
  port: 8085 # Puerto exclusivo para cocina

spring:
  application:
    name: ms-cocina
  datasource:
    url: jdbc:mysql://localhost:3306/cocina_db?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
