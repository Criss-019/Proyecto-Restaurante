server:
  port: 8089 # Puerto exclusivo para el módulo fiscal y facturación

spring:
  application:
    name: ms-facturacion
  datasource:
    url: jdbc:mysql://localhost:3306/facturacion_db?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
