server:
  port: 8083 # Puerto exclusivo para clientes

spring:
  application:
    name: ms-clientes
  datasource:
    url: jdbc:mysql://localhost:3306/clientes_db?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
