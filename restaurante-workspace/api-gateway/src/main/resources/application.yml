server:
  port: 8080 # El puerto principal por donde entrarán todos los clientes

spring:
  application:
    name: api-gateway # El nombre con el que aparecerá en Eureka
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Permite enrutar automáticamente usando los nombres de Eureka
          lower-case-service-id: true
      routes:
        - id: ms-catalogo
          uri: lb://ms-catalogo
          predicates:
            - Path=/api/catalogo/**
        - id: ms-stock
          uri: lb://ms-stock
          predicates:
            - Path=/api/stock/**
        - id: ms-clientes
          uri: lb://ms-clientes
          predicates:
            - Path=/api/clientes/**
        - id: ms-reservas
          uri: lb://ms-reservas
          predicates:
            - Path=/api/reservas/**
        - id: ms-cocina
          uri: lb://ms-cocina
          predicates:
            - Path=/api/cocina/**
        - id: ms-pedidos
          uri: lb://ms-pedidos
          predicates:
            - Path=/api/pedidos/**
        - id: ms-pagos
          uri: lb://ms-pagos
          predicates:
            - Path=/api/pagos/**
        - id: ms-despachos
          uri: lb://ms-despacho
          predicates:
            - Path=/api/despachos/**
        - id: ms-facturacion
          uri: lb://ms-facturacion
          predicates:
            - Path=/api/facturacion/**
        - id: ms-notificaciones
          uri: lb://ms-notificaciones
          predicates:
            - Path=/api/notificaciones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Aquí le indicamos dónde está Eureka

springdoc: #Para Swagger
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: 01. Catálogo
        url: /ms-catalogo/v3/api-docs
      - name: 02. Stock
        url: /ms-stock/v3/api-docs
      - name: 03. Clientes
        url: /ms-clientes/v3/api-docs
      - name: 04. Reservas
        url: /ms-reservas/v3/api-docs
      - name: 05. Cocina
        url: /ms-cocina/v3/api-docs
      - name: 06. Pedidos
        url: /ms-pedidos/v3/api-docs
      - name: 07. Pagos
        url: /ms-pagos/v3/api-docs
      - name: 08. Despachos
        url: /ms-despacho/v3/api-docs
      - name: 09. Facturación
        url: /ms-facturacion/v3/api-docs
      - name: 10. Notificaciones
        url: /ms-notificaciones/v3/api-docs