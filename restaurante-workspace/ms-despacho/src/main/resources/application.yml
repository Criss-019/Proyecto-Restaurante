server:
  port: 8088 # Puerto exclusivo para despacho/logística

spring:
  application:
    name: ms-despacho
  datasource:
    url: jdbc:mysql://localhost:3306/despacho_db?createDatabaseIfNotExist=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
